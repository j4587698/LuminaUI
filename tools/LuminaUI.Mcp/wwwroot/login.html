<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login - LuminaUI MCP</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #09090b; color: #fafafa; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-card { background: #18181b; border: 1px solid #27272a; border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; }
  h1 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
  .subtitle { color: #71717a; font-size: 14px; margin-bottom: 28px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; color: #a1a1aa; margin-bottom: 6px; }
  input { width: 100%; padding: 10px 14px; background: #09090b; border: 1px solid #27272a; border-radius: 8px; color: #fafafa; font-size: 14px; outline: none; transition: border-color 0.15s; }
  input:focus { border-color: #3b82f6; }
  .btn { width: 100%; padding: 12px; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .btn:hover { background: #1d4ed8; }
  .error { background: #ef444415; border: 1px solid #ef444433; color: #f87171; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
  .error.visible { display: block; }
</style>
</head>
<body>
<div class="login-card">
  <h1>LuminaUI MCP</h1>
  <p class="subtitle">Sign in to manage the catalog</p>
  <div class="error" id="error"><!-- ERROR --></div>
  <form method="POST" action="/login">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" required autofocus>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" required>
    </div>
    <button type="submit" class="btn">Sign in</button>
  </form>
</div>
<script>
  const err = document.getElementById('error');
  if (err.textContent.trim()) err.classList.add('visible');
</script>
</body>
</html>
