<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LuminaUI MCP Server</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #09090b; color: #fafafa; min-height: 100vh; }
  .container { max-width: 720px; margin: 0 auto; padding: 40px 20px; }
  h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
  .subtitle { color: #a1a1aa; font-size: 14px; margin-bottom: 32px; }
  .card { background: #18181b; border: 1px solid #27272a; border-radius: 12px; padding: 24px; margin-bottom: 16px; }
  .card-title { font-size: 13px; font-weight: 600; color: #71717a; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; }
  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #27272a; }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { color: #a1a1aa; font-size: 14px; }
  .stat-value { font-size: 14px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 9999px; font-size: 12px; font-weight: 600; }
  .badge-green { background: #16a34a22; color: #22c55e; }
  .badge-yellow { background: #f59e0b22; color: #fbbf24; }
  .badge-gray { background: #71717a22; color: #a1a1aa; }
  .badge-red { background: #ef444422; color: #f87171; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; color: #a1a1aa; margin-bottom: 6px; }
  input, select { width: 100%; padding: 10px 14px; background: #09090b; border: 1px solid #27272a; border-radius: 8px; color: #fafafa; font-size: 14px; outline: none; transition: border-color 0.15s; }
  input:focus, select:focus { border-color: #3b82f6; }
  input::placeholder { color: #52525b; }
  .btn { display: inline-flex; align-items: center; justify-content: center; padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; transition: all 0.15s; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: #2563eb; color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #1d4ed8; }
  .progress-bar { width: 100%; height: 6px; background: #27272a; border-radius: 3px; overflow: hidden; margin-top: 12px; }
  .progress-bar-inner { height: 100%; background: #3b82f6; border-radius: 3px; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  .progress-text { font-size: 13px; color: #a1a1aa; margin-top: 8px; }
  .result { margin-top: 16px; padding: 16px; border-radius: 8px; font-size: 13px; line-height: 1.6; }
  .result-success { background: #16a34a11; border: 1px solid #16a34a33; }
  .result-error { background: #ef444411; border: 1px solid #ef444433; }
  code { background: #27272a; padding: 2px 8px; border-radius: 4px; font-size: 13px; font-family: 'SF Mono', 'Cascadia Code', Consolas, monospace; }
  .mcp-url { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
  .mcp-url code { flex: 1; padding: 10px 14px; background: #09090b; border: 1px solid #27272a; border-radius: 8px; user-select: all; }
  .copy-btn { padding: 10px 16px; background: #27272a; border: 1px solid #3f3f46; color: #fafafa; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; white-space: nowrap; }
  .copy-btn:hover { background: #3f3f46; }
  .config-block { background: #09090b; border: 1px solid #27272a; border-radius: 8px; padding: 16px; margin-top: 12px; font-family: 'SF Mono', 'Cascadia Code', Consolas, monospace; font-size: 13px; line-height: 1.7; white-space: pre; overflow-x: auto; color: #d4d4d8; }
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 32px; }
  .logout { font-size: 13px; color: #71717a; text-decoration: none; padding: 6px 12px; border: 1px solid #27272a; border-radius: 6px; }
  .logout:hover { color: #fafafa; border-color: #3f3f46; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>LuminaUI MCP Server</h1>
      <p class="subtitle">组件库知识服务 &mdash; 为 AI 提供 LuminaUI 组件、样式、示例的结构化访问</p>
    </div>
    <a href="/logout" class="logout">Logout</a>
  </div>

  <!-- Status -->
  <div class="card">
    <div class="card-title">Catalog Status</div>
    <div id="status-content">
      <div class="stat-row"><span class="stat-label">Status</span><span id="s-status" class="stat-value">Loading...</span></div>
    </div>
  </div>

  <!-- Reindex -->
  <div class="card">
    <div class="card-title">Reindex from Git</div>
    <div class="form-group">
      <label>Branch or Tag</label>
      <input id="ref-input" type="text" placeholder="main (leave empty for default branch)">
    </div>
    <button id="reindex-btn" class="btn btn-primary" onclick="startReindex()">Build Catalog</button>
    <div id="progress-area" style="display:none">
      <div class="progress-bar"><div class="progress-bar-inner"></div></div>
      <div id="progress-text" class="progress-text"></div>
    </div>
    <div id="result-area"></div>
  </div>

  <!-- MCP Connection -->
  <div class="card">
    <div class="card-title">MCP Connection</div>
    <p style="font-size:14px;color:#a1a1aa;margin-bottom:12px;">Endpoint for AI clients (VS Code Copilot, Claude, etc.)</p>
    <div class="mcp-url">
      <code id="mcp-url"></code>
      <button class="copy-btn" onclick="copyUrl()">Copy</button>
    </div>
    <div class="config-block" id="config-example"></div>
  </div>
</div>

<script>
const api = '';

async function loadStatus() {
  try {
    const r = await fetch(api + '/api/catalog');
    const d = await r.json();
    const el = document.getElementById('status-content');
    if (d.status === 'empty') {
      el.innerHTML = `
        <div class="stat-row"><span class="stat-label">Status</span><span class="badge badge-yellow">Empty</span></div>
        <div class="stat-row"><span class="stat-label">Action</span><span class="stat-value" style="color:#a1a1aa">Use the form below to build</span></div>`;
    } else {
      el.innerHTML = `
        <div class="stat-row"><span class="stat-label">Status</span><span class="badge badge-green">Ready</span></div>
        <div class="stat-row"><span class="stat-label">Version</span><span class="stat-value">${d.libraryVersion}</span></div>
        <div class="stat-row"><span class="stat-label">Source</span><span class="stat-value">${d.sourceCommit || '-'}</span></div>
        <div class="stat-row"><span class="stat-label">Components</span><span class="stat-value">${d.componentCount}</span></div>
        <div class="stat-row"><span class="stat-label">Generated</span><span class="stat-value">${new Date(d.generatedAt).toLocaleString()}</span></div>`;
    }
  } catch(e) {
    document.getElementById('s-status').textContent = 'Error';
  }
}

async function startReindex() {
  const btn = document.getElementById('reindex-btn');
  const ref = document.getElementById('ref-input').value.trim() || null;
  btn.disabled = true;
  document.getElementById('progress-area').style.display = 'block';
  document.getElementById('result-area').innerHTML = '';

  try {
    const body = ref ? { branch: ref } : {};
    await fetch(api + '/api/reindex', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    pollProgress();
  } catch(e) {
    document.getElementById('result-area').innerHTML = `<div class="result result-error">Request failed: ${e.message}</div>`;
    btn.disabled = false;
    document.getElementById('progress-area').style.display = 'none';
  }
}

async function pollProgress() {
  try {
    const r = await fetch(api + '/api/reindex/status');
    const d = await r.json();
    document.getElementById('progress-text').textContent = d.progress || 'Working...';

    if (d.isRunning) {
      setTimeout(pollProgress, 1000);
    } else {
      document.getElementById('reindex-btn').disabled = false;
      document.getElementById('progress-area').style.display = 'none';
      const res = d.lastResult;
      if (res?.status === 'success') {
        document.getElementById('result-area').innerHTML = `
          <div class="result result-success">
            <strong>Build complete</strong><br>
            Version: ${res.libraryVersion} &middot; Commit: ${res.commit}<br>
            ${res.componentCount} components &middot; ${res.enumCount} enums &middot; ${res.exampleCount} examples &middot; ${res.tokenCount} tokens
          </div>`;
        loadStatus();
      } else {
        document.getElementById('result-area').innerHTML = `<div class="result result-error">Error: ${res?.error || 'Unknown'}</div>`;
      }
    }
  } catch(e) {
    document.getElementById('progress-text').textContent = 'Polling...';
    setTimeout(pollProgress, 2000);
  }
}

function copyUrl() {
  const url = document.getElementById('mcp-url').textContent;
  navigator.clipboard.writeText(url);
}

// Init
const port = location.port || '3001';
const host = location.hostname;
const mcpUrl = `http://${host}:${port}/mcp`;
document.getElementById('mcp-url').textContent = mcpUrl;
document.getElementById('config-example').textContent = JSON.stringify({
  servers: {
    LuminaUI: { type: "http", url: mcpUrl }
  }
}, null, 2);

loadStatus();
</script>
</body>
</html>
