name: LuminaUI Diagnostics MCP

on:
  push:
    branches:
      - master
      - main
    paths:
      - "Directory.Build.Diagnostics.props"
      - "Directory.Build.targets"
      - "Directory.Packages.props"
      - "src/LuminaUI.Diagnostics.Abstractions/**"
      - "src/LuminaUI.Diagnostics/**"
      - "tools/LuminaUI.Diagnostics.Mcp/**"
      - "README.md"
      - "README.zh-CN.md"
      - "LICENSE"
      - ".github/workflows/diagnostics-mcp.yml"
  workflow_dispatch:

permissions:
  contents: write

env:
  CONFIGURATION: Release
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  NUGET_SOURCE: https://api.nuget.org/v3/index.json

jobs:
  prepare:
    name: Prepare diagnostics MCP release
    runs-on: ubuntu-latest

    outputs:
      should_release: ${{ steps.prepare.outputs.should_release }}
      diagnostics_version: ${{ steps.prepare.outputs.diagnostics_version }}
      diagnostics_mcp_version: ${{ steps.prepare.outputs.diagnostics_mcp_version }}
      tag_name: ${{ steps.prepare.outputs.tag_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve versions
        id: prepare
        shell: pwsh
        run: |
          [xml]$props = Get-Content -LiteralPath "Directory.Build.Diagnostics.props"
          $diagnosticsVersion = [string]$props.Project.PropertyGroup.LuminaUIDiagnosticsVersion
          $diagnosticsMcpVersion = [string]$props.Project.PropertyGroup.LuminaUIDiagnosticsMcpVersion

          function Assert-StableVersion([string]$name, [string]$value) {
            if ([string]::IsNullOrWhiteSpace($value)) {
              throw "$name is missing in Directory.Build.Diagnostics.props."
            }

            $parsedVersion = $null
            if (-not [Version]::TryParse($value, [ref]$parsedVersion)) {
              throw "$name must be a stable numeric SemVer version such as 0.1.0. Current value: '$value'."
            }
          }

          Assert-StableVersion "LuminaUIDiagnosticsVersion" $diagnosticsVersion
          Assert-StableVersion "LuminaUIDiagnosticsMcpVersion" $diagnosticsMcpVersion

          $tagName = "diagnostics-v$diagnosticsVersion-mcp-v$diagnosticsMcpVersion"
          $existingTag = git tag --list $tagName

          "diagnostics_version=$diagnosticsVersion" >> $env:GITHUB_OUTPUT
          "diagnostics_mcp_version=$diagnosticsMcpVersion" >> $env:GITHUB_OUTPUT
          "tag_name=$tagName" >> $env:GITHUB_OUTPUT

          if (-not [string]::IsNullOrWhiteSpace($existingTag)) {
            Write-Host "Tag '$tagName' already exists. Nothing to publish."
            "should_release=false" >> $env:GITHUB_OUTPUT
            exit 0
          }

          Write-Host "Preparing diagnostics MCP release '$tagName'."
          "should_release=true" >> $env:GITHUB_OUTPUT

  nuget:
    name: Build diagnostics MCP packages
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: |
          dotnet restore src/LuminaUI.Diagnostics.Abstractions/LuminaUI.Diagnostics.Abstractions.csproj
          dotnet restore src/LuminaUI.Diagnostics/LuminaUI.Diagnostics.csproj
          dotnet restore tools/LuminaUI.Diagnostics.Mcp/LuminaUI.Diagnostics.Mcp.csproj

      - name: Build
        run: |
          dotnet build src/LuminaUI.Diagnostics.Abstractions/LuminaUI.Diagnostics.Abstractions.csproj --configuration "$CONFIGURATION" --no-restore /p:ContinuousIntegrationBuild=true
          dotnet build src/LuminaUI.Diagnostics/LuminaUI.Diagnostics.csproj --configuration "$CONFIGURATION" --no-restore /p:ContinuousIntegrationBuild=true
          dotnet build tools/LuminaUI.Diagnostics.Mcp/LuminaUI.Diagnostics.Mcp.csproj --configuration "$CONFIGURATION" --no-restore /p:ContinuousIntegrationBuild=true

      - name: Pack
        run: |
          mkdir -p artifacts/packages
          dotnet pack src/LuminaUI.Diagnostics.Abstractions/LuminaUI.Diagnostics.Abstractions.csproj --configuration "$CONFIGURATION" --no-build --output artifacts/packages /p:ContinuousIntegrationBuild=true
          dotnet pack src/LuminaUI.Diagnostics/LuminaUI.Diagnostics.csproj --configuration "$CONFIGURATION" --no-build --output artifacts/packages /p:ContinuousIntegrationBuild=true
          dotnet pack tools/LuminaUI.Diagnostics.Mcp/LuminaUI.Diagnostics.Mcp.csproj --configuration "$CONFIGURATION" --no-build --output artifacts/packages /p:ContinuousIntegrationBuild=true

      - name: Upload diagnostics MCP artifacts
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-mcp-packages
          path: artifacts/packages/*

  release:
    name: Publish diagnostics MCP packages
    needs:
      - prepare
      - nuget
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/release

      - name: Publish packages to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        shell: bash
        run: |
          shopt -s nullglob

          if [ -z "$NUGET_API_KEY" ]; then
            echo "NUGET_API_KEY secret is required to publish packages."
            exit 1
          fi

          packages=(artifacts/release/diagnostics-mcp-packages/*.nupkg)
          symbols=(artifacts/release/diagnostics-mcp-packages/*.snupkg)

          if [ ${#packages[@]} -eq 0 ]; then
            echo "No .nupkg files were produced."
            exit 1
          fi

          for package in "${packages[@]}"; do
            dotnet nuget push "$package" \
              --api-key "$NUGET_API_KEY" \
              --source "$NUGET_SOURCE" \
              --skip-duplicate
          done

          for symbol in "${symbols[@]}"; do
            dotnet nuget push "$symbol" \
              --api-key "$NUGET_API_KEY" \
              --source "$NUGET_SOURCE" \
              --skip-duplicate
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN || github.token }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
          DIAGNOSTICS_VERSION: ${{ needs.prepare.outputs.diagnostics_version }}
          DIAGNOSTICS_MCP_VERSION: ${{ needs.prepare.outputs.diagnostics_mcp_version }}
        shell: bash
        run: |
          mapfile -t assets < <(find artifacts/release -type f | sort)

          if [ ${#assets[@]} -eq 0 ]; then
            echo "No release assets were downloaded."
            exit 1
          fi

          gh release create "$TAG_NAME" "${assets[@]}" \
            --target "$GITHUB_SHA" \
            --title "LuminaUI Diagnostics $DIAGNOSTICS_VERSION / MCP $DIAGNOSTICS_MCP_VERSION" \
            --generate-notes
